<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalar PontoWeb</title>

    <link id="manifest-link" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#166534">
    <link rel="apple-touch-icon" href="https://github.com/sistemas-luiz/PontoWeb/blob/main/Icone.png?raw=true">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #f0fdf4;
            font-family: sans-serif;
        }

        .bounce {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .story-overlay {
            backdrop-filter: blur(10px);
        }

        .story-nav-area {
            -webkit-tap-highlight-color: transparent;
        }
    </style>

    <script>
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (!isMobile) {
                const manifest = document.getElementById('manifest-link');
                manifest.setAttribute('href', 'manifest_pc.json');
            }
        })();
    </script>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center fade-in relative overflow-hidden z-10">

    <div class="absolute top-0 left-0 w-full h-2 bg-green-500"></div>

    <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
        <img src="https://github.com/sistemas-luiz/PontoWeb/blob/main/Icone.png?raw=true"
             class="w-14 h-14 bounce"
             onerror="this.src='https://placehold.co/150x150/dcfce7/166534?text=PontoWeb'">
    </div>

    <h1 class="text-2xl font-bold text-gray-800 mb-2">Instalar PontoWeb</h1>

    <p id="deviceText" class="text-gray-500 mb-4 text-sm">
        Tenha acesso rápido ao sistema de ponto.
    </p>

    <div id="browserInfo"
         class="mb-8 h-6 text-xs font-medium flex justify-center items-center">
    </div>

    <button id="installBtn"
            class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-green-700 transition-all active:scale-95 hidden flex items-center justify-center gap-2">

        <svg class="w-6 h-6"
             fill="none"
             stroke="currentColor"
             viewBox="0 0 24 24">

            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4">
            </path>
        </svg>

        <span id="installBtnText">Instalar Aplicativo</span>
    </button>

    <!-- GUIAS COM LOGOS PERSONALIZADOS -->
    <div class="flex gap-3 justify-center mt-6">

        <!-- Android -->
        <button onclick="openStory('android')"
                class="flex items-center gap-2 px-4 py-2.5 bg-green-50 text-green-700 rounded-full text-xs font-bold hover:bg-green-100 transition-colors">

            <img src="https://raw.githubusercontent.com/sistemas-luiz/PontoWeb/main/Imagens/Android/Android.png"
                 alt="Android"
                 class="w-5 h-5 object-contain">

            <span>Guia Android</span>
        </button>

        <!-- iPhone -->
        <button onclick="openStory('ios')"
                class="flex items-center gap-2 px-4 py-2.5 bg-blue-50 text-blue-700 rounded-full text-xs font-bold hover:bg-blue-100 transition-colors">

            <img src="https://raw.githubusercontent.com/sistemas-luiz/PontoWeb/main/Imagens/Iphone/Apple_logo.png"
                 alt="Apple"
                 class="w-5 h-5 object-contain">

            <span>Guia iPhone</span>
        </button>

    </div>

    <a id="openAppBtn"
       href="#"
       class="block mt-6 text-green-600 font-bold text-sm hover:underline">
        Abrir PontoWeb
    </a>

    <p class="text-xs text-gray-400 mt-8">Versão de Teste 1.0</p>
</div>

<!-- STORY -->
<div id="storyModal"
     class="fixed inset-0 bg-black z-50 hidden flex flex-col fade-in">

    <div class="absolute top-0 left-0 w-full p-2 z-20 flex gap-1"
         id="storyProgressContainer">
    </div>

    <div class="absolute top-4 left-0 w-full px-4 z-20 flex justify-between items-center text-white drop-shadow-md">

        <div class="flex items-center gap-2">
            <span id="storyIcon"
                  class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                📱
            </span>

            <span id="storyTitle" class="font-bold text-sm">
                Instalação
            </span>
        </div>

        <button onclick="closeStory()"
                class="text-3xl opacity-80 hover:opacity-100 font-normal leading-none">
            &times;
        </button>
    </div>

    <div class="flex-1 relative flex items-center justify-center bg-black h-full">

        <div id="storyLoading"
             class="absolute inset-0 flex items-center justify-center text-white/50 text-xs">
            Carregando...
        </div>

        <img id="storyImage"
             src=""
             class="max-h-full max-w-full object-contain transition-opacity duration-200 z-10"
             onload="document.getElementById('storyLoading').style.display='none'">

        <div class="absolute inset-y-0 left-0 w-1/3 z-20 story-nav-area"
             onclick="prevStoryStep(event)"></div>

        <div class="absolute inset-y-0 right-0 w-1/3 z-20 story-nav-area"
             onclick="nextStoryStep(event)"></div>
    </div>

    <div class="p-4 bg-black/80 backdrop-blur-md text-white flex justify-between items-center z-20">

        <button onclick="prevStoryStep(event)"
                class="px-4 py-2 bg-white/10 rounded-full text-xs font-bold hover:bg-white/20">
            Anterior
        </button>

        <span id="storyStepText"
              class="text-xs font-mono opacity-60">
            1 / 15
        </span>

        <button onclick="nextStoryStep(event)"
                class="px-4 py-2 bg-green-600 rounded-full text-xs font-bold hover:bg-green-500">
            Próximo
        </button>
    </div>
</div>

<script>

const guides = {
    android: {
        max: 15,
        title: "Instalação Android",
        baseUrl: "https://github.com/sistemas-luiz/PontoWeb/blob/main/Imagens/Android/"
    },

    ios: {
        max: 13,
        title: "Instalação iPhone",
        baseUrl: "https://github.com/sistemas-luiz/PontoWeb/blob/main/Imagens/Iphone/"
    }
};

let currentGuide = null;
let currentStep = 1;

function openStory(type) {

    currentGuide = guides[type];
    currentStep = 1;

    document.getElementById('storyTitle').textContent = currentGuide.title;

    const storyIcon = document.getElementById('storyIcon');

    if (type === 'android') {

        storyIcon.innerHTML = `
            <img src="https://raw.githubusercontent.com/sistemas-luiz/PontoWeb/main/Imagens/Android/Android.png"
                 class="w-6 h-6 object-contain"
                 alt="Android">
        `;

    } else {

        storyIcon.innerHTML = `
            <img src="https://raw.githubusercontent.com/sistemas-luiz/PontoWeb/main/Imagens/Iphone/Apple_logo.png"
                 class="w-6 h-6 object-contain"
                 alt="Apple">
        `;
    }

    document.getElementById('storyModal').classList.remove('hidden');

    renderProgressBars();
    updateStoryImage();
}

function closeStory() {
    document.getElementById('storyModal').classList.add('hidden');
}

function updateStoryImage() {

    const img = document.getElementById('storyImage');
    const loader = document.getElementById('storyLoading');
    const counter = document.getElementById('storyStepText');

    loader.style.display = 'flex';
    img.style.opacity = '0.5';

    img.src = `${currentGuide.baseUrl}${currentStep}.png?raw=true`;

    img.onload = () => {
        img.style.opacity = '1';
        loader.style.display = 'none';
    };

    img.onerror = () => {
        img.src = `https://placehold.co/600x1200/000000/ffffff?text=Passo+${currentStep}`;
        loader.style.display = 'none';
    };

    counter.textContent = `${currentStep} / ${currentGuide.max}`;

    updateProgressBars();
}

function nextStoryStep(e) {

    if (e) e.stopPropagation();

    if (currentStep < currentGuide.max) {
        currentStep++;
        updateStoryImage();
    } else {
        closeStory();
    }
}

function prevStoryStep(e) {

    if (e) e.stopPropagation();

    if (currentStep > 1) {
        currentStep--;
        updateStoryImage();
    }
}

function renderProgressBars() {

    const container = document.getElementById('storyProgressContainer');

    container.innerHTML = '';

    for (let i = 1; i <= currentGuide.max; i++) {

        const bar = document.createElement('div');

        bar.className = 'h-1 rounded-full bg-white/30 flex-1 transition-colors duration-300';
        bar.id = `story-bar-${i}`;

        container.appendChild(bar);
    }
}

function updateProgressBars() {

    for (let i = 1; i <= currentGuide.max; i++) {

        const bar = document.getElementById(`story-bar-${i}`);

        if (!bar) continue;

        if (i <= currentStep) {
            bar.classList.remove('bg-white/30');
            bar.classList.add('bg-white');
        } else {
            bar.classList.add('bg-white/30');
            bar.classList.remove('bg-white');
        }
    }
}

</script>

</body>
</html>
