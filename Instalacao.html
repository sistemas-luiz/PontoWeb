<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalar PontoWeb</title>
    
    <!-- PWA Setup -->
    <link id="manifest-link" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#166534">
    <link rel="apple-touch-icon" href="https://github.com/sistemas-luiz/PontoWeb/blob/main/Icone.png?raw=true">
    
    <!-- Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0fdf4; font-family: sans-serif; }
        .bounce { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Story Styles */
        .story-nav-area { -webkit-tap-highlight-color: transparent; }
        /* Garantir que os botões do modal fiquem sempre clicáveis */
        #storyModal button { pointer-events: auto; }
    </style>

    <!-- Detecção de dispositivo -->
    <script>
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) {
                document.getElementById('manifest-link').setAttribute('href', 'manifest_pc.json');
            }
        })();
    </script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center fade-in relative overflow-hidden z-10">
        <div class="absolute top-0 left-0 w-full h-2 bg-green-500"></div>

        <!-- Logo -->
        <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
            <img src="https://github.com/sistemas-luiz/PontoWeb/blob/main/Icone.png?raw=true" class="w-14 h-14 bounce" onerror="this.src='https://placehold.co/150x150/dcfce7/166534?text=PontoWeb'">
        </div>

        <h1 class="text-2xl font-bold text-gray-800 mb-2">Instalar PontoWeb</h1>
        <p id="deviceText" class="text-gray-500 mb-4 text-sm">Tenha acesso rápido ao sistema de ponto.</p>

        <div id="browserInfo" class="mb-8 h-6 text-xs font-medium flex justify-center items-center"></div>

        <!-- Botão de instalação -->
        <button id="installBtn" type="button" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-green-700 transition-all active:scale-95 hidden items-center justify-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            <span id="installBtnText">Instalar Aplicativo</span>
        </button>

        <!-- Instruções iOS -->
        <div id="iosInstruction" class="hidden mt-4 bg-gray-50 p-4 rounded-xl text-left border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-2 flex items-center gap-2">
                <svg class="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.8-1.31.05-2.3-1.23-3.14-2.47-1.72-2.49-3.03-7.05-1.27-10.11 1.6-2.78 4.5-2.73 5.95-2.71 1.48.03 2.85.99 3.75.99.89 0 2.57-1.23 4.33-1.04 1.44.13 2.76.74 3.65 1.83-3.14 1.89-2.61 7.15.54 8.52zM13 1.75c.78-.96 1.3-2.3 1.15-3.63-1.12.05-2.49.77-3.29 1.73-.73.86-1.36 2.22-1.18 3.56 1.25.1 2.53-.7 3.32-1.66z"></path></svg>
                Para iPhone/iPad:
            </h3>
            <ol class="text-sm text-gray-600 space-y-2 list-decimal list-inside">
                <li>Toque no botão <strong>Compartilhar</strong> <svg class="w-4 h-4 inline text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg></li>
                <li>Role para baixo e selecione <strong>Adicionar ao Ecrã Principal</strong>.</li>
                <li>Toque em <strong>Adicionar</strong> no canto superior.</li>
            </ol>
        </div>

        <!-- Botões de guia visual -->
        <div class="flex gap-3 justify-center mt-6">
            <button id="androidGuideBtn" type="button" class="flex items-center gap-2 px-4 py-2.5 bg-green-50 text-green-700 rounded-full text-xs font-bold hover:bg-green-100 transition-colors">
                <img src="https://github.com/sistemas-luiz/PontoWeb/blob/main/Imagens/Android/Android.png?raw=true" class="w-4 h-4" alt="Android">
                Guia Android
            </button>
            <button id="iosGuideBtn" type="button" class="flex items-center gap-2 px-4 py-2.5 bg-blue-50 text-blue-700 rounded-full text-xs font-bold hover:bg-blue-100 transition-colors">
                <img src="https://github.com/sistemas-luiz/PontoWeb/blob/main/Imagens/Iphone/Apple_logo.png?raw=true" class="w-4 h-4" alt="Apple">
                Guia iPhone
            </button>
        </div>

        <a id="openAppBtn" href="#" class="block mt-6 text-green-600 font-bold text-sm hover:underline">Abrir PontoWeb</a>
        <p class="text-xs text-gray-400 mt-8">Versão de Teste 1.0</p>
    </div>

    <!-- STORY MODAL -->
    <div id="storyModal" class="fixed inset-0 bg-black z-50 hidden flex-col fade-in" style="display: none;">
        <!-- Barra de progresso -->
        <div class="absolute top-0 left-0 w-full p-2 z-30 flex gap-1" id="storyProgressContainer"></div>

        <!-- Header -->
        <div class="absolute top-4 left-0 w-full px-4 z-30 flex justify-between items-center text-white drop-shadow-md">
            <div class="flex items-center gap-2">
                <span class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">📱</span>
                <span id="storyTitle" class="font-bold text-sm">Instalação</span>
            </div>
            <button id="closeStoryBtn" type="button" class="text-3xl opacity-80 hover:opacity-100 font-normal leading-none">&times;</button>
        </div>

        <!-- Área da imagem -->
        <div class="flex-1 relative flex items-center justify-center bg-black overflow-hidden">
            <div id="storyLoading" class="absolute inset-0 flex items-center justify-center text-white/50 text-xs">Carregando...</div>
            <img id="storyImage" src="" class="max-h-full max-w-full object-contain transition-opacity duration-200 z-10">
            
            <!-- Áreas de toque (delimitadas à imagem) -->
            <div id="touchLeft" class="absolute inset-y-0 left-0 w-1/3 z-20 story-nav-area"></div>
            <div id="touchRight" class="absolute inset-y-0 right-0 w-1/3 z-20 story-nav-area"></div>
        </div>

        <!-- Rodapé de controle -->
        <div class="p-4 bg-black/80 backdrop-blur-md text-white flex justify-between items-center z-30">
            <button id="prevStepBtn" type="button" class="px-4 py-2 bg-white/10 rounded-full text-xs font-bold hover:bg-white/20">Anterior</button>
            <span id="storyStepText" class="text-xs font-mono opacity-60">1 / 15</span>
            <button id="nextStepBtn" type="button" class="px-4 py-2 bg-green-600 rounded-full text-xs font-bold hover:bg-green-500 shadow-lg shadow-green-900/50">Próximo</button>
        </div>
    </div>

    <script>
        (function() {
            // === Configuração de links por dispositivo ===
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const openAppBtn = document.getElementById('openAppBtn');
            const deviceText = document.getElementById('deviceText');
            const installBtnText = document.getElementById('installBtnText');
            const browserInfo = document.getElementById('browserInfo');

            if (isMobile) {
                openAppBtn.href = "https://sistemas-luiz.github.io/PontoWeb/index.html";
                deviceText.textContent = "Instale o app no seu celular para acesso rápido.";
            } else {
                openAppBtn.href = "https://sistemas-luiz.github.io/PontoWeb/index_pc.html";
                deviceText.textContent = "Instale a versão Desktop no seu computador.";
                installBtnText.textContent = "Instalar no PC";
            }

            // === Service Worker ===
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            }

            // === Lógica de instalação PWA ===
            let deferredPrompt;
            const installBtn = document.getElementById('installBtn');
            const iosInstruction = document.getElementById('iosInstruction');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.classList.remove('hidden');
                installBtn.style.display = 'flex'; // garantir exibição
            });

            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        deferredPrompt = null;
                        installBtn.classList.add('hidden');
                    }
                }
            });

            // Detecção iOS / standalone
            const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

            if (isIos && !isStandalone) {
                iosInstruction.classList.remove('hidden');
            } else if (!isStandalone) {
                const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor) && !/Edg|OPR/.test(navigator.userAgent);
                if (isChrome) {
                    browserInfo.innerHTML = '<span class="inline-flex items-center gap-1 text-green-600 bg-green-50 px-3 py-1 rounded-full"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> Pronto para Instalar!</span>';
                } else {
                    browserInfo.innerHTML = '<span class="inline-flex items-center gap-1 text-orange-600 bg-orange-50 px-3 py-1 rounded-full"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg> Para realizar a instalação, use o navegador Google Chrome</span>';
                }
            }

            if (isStandalone) {
                document.querySelector('h1').textContent = "PontoWeb Instalado";
                document.querySelector('p').textContent = "O aplicativo já está pronto para uso.";
                installBtn.style.display = 'none';
                if(browserInfo) browserInfo.style.display = 'none';
            }

            // === STORY LOGIC ===
            const storyModal = document.getElementById('storyModal');
            const storyImage = document.getElementById('storyImage');
            const storyLoading = document.getElementById('storyLoading');
            const storyTitle = document.getElementById('storyTitle');
            const storyStepText = document.getElementById('storyStepText');
            const progressContainer = document.getElementById('storyProgressContainer');
            
            const guides = {
                android: { max: 15, title: "Instalação Android", baseUrl: "https://github.com/sistemas-luiz/PontoWeb/blob/main/Imagens/Android/" },
                ios: { max: 13, title: "Instalação iPhone", baseUrl: "https://github.com/sistemas-luiz/PontoWeb/blob/main/Imagens/Iphone/" }
            };

            let currentGuide = null;
            let currentStep = 1;

            function openStory(type) {
                currentGuide = guides[type];
                currentStep = 1;
                storyTitle.textContent = currentGuide.title;
                storyModal.style.display = 'flex'; // garantia extra
                storyModal.classList.remove('hidden');
                renderProgressBars();
                updateStoryImage();
            }

            function closeStory() {
                storyModal.classList.add('hidden');
                storyModal.style.display = 'none';
            }

            function updateStoryImage() {
                storyLoading.style.display = 'flex';
                storyImage.style.opacity = '0.5';
                storyImage.src = `${currentGuide.baseUrl}${currentStep}.png?raw=true`;
                
                storyImage.onload = () => {
                    storyImage.style.opacity = '1';
                    storyLoading.style.display = 'none';
                };
                storyImage.onerror = () => {
                    storyImage.src = `https://placehold.co/600x1200/000000/ffffff?text=Passo+${currentStep}+-+PontoWeb`;
                    storyLoading.style.display = 'none';
                };

                storyStepText.textContent = `${currentStep} / ${currentGuide.max}`;
                updateProgressBars();

                if(currentStep < currentGuide.max) {
                    new Image().src = `${currentGuide.baseUrl}${currentStep + 1}.png?raw=true`;
                }
            }

            function nextStep(e) {
                if (e) e.stopPropagation();
                if (currentStep < currentGuide.max) {
                    currentStep++;
                    updateStoryImage();
                } else {
                    closeStory();
                }
            }

            function prevStep(e) {
                if (e) e.stopPropagation();
                if (currentStep > 1) {
                    currentStep--;
                    updateStoryImage();
                }
            }

            function renderProgressBars() {
                progressContainer.innerHTML = '';
                for(let i=1; i<=currentGuide.max; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'h-1 rounded-full bg-white/30 flex-1 transition-colors duration-300';
                    bar.id = `story-bar-${i}`;
                    progressContainer.appendChild(bar);
                }
            }

            function updateProgressBars() {
                for(let i=1; i<=currentGuide.max; i++) {
                    const bar = document.getElementById(`story-bar-${i}`);
                    if (bar) {
                        bar.classList.toggle('bg-white', i <= currentStep);
                        bar.classList.toggle('bg-white/30', i > currentStep);
                    }
                }
            }

            // Event listeners (substituem os onclicks inline para evitar conflitos)
            document.getElementById('closeStoryBtn').addEventListener('click', closeStory);
            document.getElementById('nextStepBtn').addEventListener('click', nextStep);
            document.getElementById('prevStepBtn').addEventListener('click', prevStep);
            document.getElementById('touchLeft').addEventListener('click', prevStep);
            document.getElementById('touchRight').addEventListener('click', nextStep);
            document.getElementById('androidGuideBtn').addEventListener('click', () => openStory('android'));
            document.getElementById('iosGuideBtn').addEventListener('click', () => openStory('ios'));

            // Fecha o modal ao clicar fora (opcional, mas melhora usabilidade)
            storyModal.addEventListener('click', function(e) {
                if (e.target === storyModal) closeStory();
            });
        })();
    </script>
</body>
</html>
